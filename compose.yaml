name: loop

x-api-environment: &api-environment
  env_file:
    - .env.production
  networks:
    - backend
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: '5'

services:
  db:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    shm_size: 256m
    mem_limit: 1g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  redis:
    image: redis:8-bookworm
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    cpus: 0.75
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '5'

  api:
    <<: *api-environment
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    image: loop-api:${LOOP_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 127.0.0.1:8000:8000
    mem_limit: 768m
    cpus: 1.5
    stop_grace_period: 30s

  worker:
    <<: *api-environment
    image: loop-api:${LOOP_IMAGE_TAG:-local}
    command: ['python', '-m', 'app.chain_worker']
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m
    cpus: 0.75
    stop_grace_period: 30s
    healthcheck:
      disable: true

  migrate:
    <<: *api-environment
    image: loop-api:${LOOP_IMAGE_TAG:-local}
    command: ['alembic', '-c', '/app/alembic.ini', 'upgrade', 'head']
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      disable: true

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
