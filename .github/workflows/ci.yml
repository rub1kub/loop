name: CI and testnet deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:web
      - run: npm run test:web
      - run: npm run build:web
      - run: npm run format:check
      - run: npx playwright install --with-deps chromium
      - run: npm --workspace @loop/web run e2e
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install -e 'apps/api[dev]'
      - run: ruff check apps/api
      - run: mypy apps/api/app
      - run: pytest apps/api/tests --cov=app --cov-fail-under=60

  contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ton-blockchain/setup-acton@2d38fd579e1bf8753a3e0cff9ad695612b98a676 # v1.0.0
      - run: acton build
      - run: acton check --output-format github
      - run: acton test --coverage --coverage-format text --coverage-minimum-percent 75

  deploy-testnet:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, api, contracts]
    runs-on: ubuntu-latest
    environment: testnet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: apps/web/dist
      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Upload immutable release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar --exclude-vcs --exclude=node_modules --exclude=.venv --exclude=.acton \
            --exclude=build --exclude=output --exclude='.env*' -czf /tmp/loop-release.tgz .
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p /opt/loop/incoming /opt/loop/releases/${GITHUB_SHA}"
          scp /tmp/loop-release.tgz "$VPS_USER@$VPS_HOST:/opt/loop/incoming/${GITHUB_SHA}.tgz"
          ssh "$VPS_USER@$VPS_HOST" \
            "tar -xzf /opt/loop/incoming/${GITHUB_SHA}.tgz -C /opt/loop/releases/${GITHUB_SHA} && /opt/loop/releases/${GITHUB_SHA}/deploy/activate-release.sh ${GITHUB_SHA}"
