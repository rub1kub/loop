name: CI and testnet deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:web
      - run: npm run test:web
      - run: npm run build:web
      - run: npm run format:check
      - run: npx playwright install --with-deps chromium webkit
      - run: npm --workspace @loop/web run e2e
      - run: npm --workspace @loop/web run e2e:webkit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm@sha256:67870dc097790edf2bd6726658db995dcc830f799d41bb2b78ef07c9a2d5f010
        env:
          POSTGRES_DB: loop_ci
          POSTGRES_USER: loop_ci
          POSTGRES_PASSWORD: loop_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loop_ci -d loop_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install -e 'apps/api[dev]'
      - run: ruff check apps/api
      - run: mypy apps/api/app
      - run: pytest apps/api/tests --cov=app --cov-fail-under=60
      - name: Verify PostgreSQL migrations
        env:
          LOOP_DATABASE_URL: postgresql+asyncpg://loop_ci:loop_ci_password@127.0.0.1:5432/loop_ci
        run: |
          cd apps/api
          alembic upgrade head
          alembic check

  contracts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ton-blockchain/setup-acton@2d38fd579e1bf8753a3e0cff9ad695612b98a676 # v1.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
      - run: python -m pip install httpx==0.28.1 tonsdk==1.0.15
      - run: acton build
      - run: acton check --output-format github
      - run: acton test --coverage --coverage-format text --coverage-minimum-percent 75
      - run: python scripts/verify-contracts.py

  deploy-testnet:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [web, api, contracts]
    runs-on: ubuntu-latest
    environment: testnet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist
          path: apps/web/dist
      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
      - name: Upload immutable release
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          tar --exclude-vcs --exclude=node_modules --exclude=.venv --exclude=.acton \
            --exclude=build --exclude=output --exclude=sources --exclude=wallets.toml \
            --exclude=coverage.txt --exclude=AGENTS.md --exclude='.env*' \
            -czf /tmp/loop-release.tgz .
          ssh "$VPS_USER@$VPS_HOST" "mkdir -p /opt/loop/incoming /opt/loop/releases/${GITHUB_SHA}"
          scp /tmp/loop-release.tgz "$VPS_USER@$VPS_HOST:/opt/loop/incoming/${GITHUB_SHA}.tgz"
          ssh "$VPS_USER@$VPS_HOST" \
            "tar -xzf /opt/loop/incoming/${GITHUB_SHA}.tgz -C /opt/loop/releases/${GITHUB_SHA} && /opt/loop/releases/${GITHUB_SHA}/deploy/activate-release.sh ${GITHUB_SHA}"
