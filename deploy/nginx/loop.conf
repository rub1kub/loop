limit_req_zone $binary_remote_addr zone=loop_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=loop_auth:10m rate=2r/s;

server {
    listen 127.0.0.1:18791;
    server_name 144-31-30-62.sslip.io;
    server_tokens off;

    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /opt/loop/current/apps/web/dist;
    index index.html;
    client_max_body_size 32k;

    include /etc/nginx/snippets/loop-security-headers.conf;

    location ~ (^|/)\. {
        return 404;
    }

    location = /metrics {
        return 404;
    }

    location = /api/v1/auth/telegram {
        limit_req zone=loop_auth burst=8 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/loop-proxy.conf;
    }

    location /api/ {
        limit_req zone=loop_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/loop-proxy.conf;
    }

    location = /live {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/loop-proxy.conf;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/snippets/loop-proxy.conf;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        include /etc/nginx/snippets/loop-security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    location = /tonconnect-manifest.json {
        try_files $uri =404;
        include /etc/nginx/snippets/loop-security-headers.conf;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/loop-security-headers.conf;
        add_header Cache-Control "no-store";
    }
}
