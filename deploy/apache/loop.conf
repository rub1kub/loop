<VirtualHost *:80>
    ServerName app.tonsuite.org

    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://app.tonsuite.org%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName app.tonsuite.org

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/app.tonsuite.org/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/app.tonsuite.org/privkey.pem
        SSLProtocol -all +TLSv1.2 +TLSv1.3

        ProxyPreserveHost On
        RequestHeader set X-Forwarded-Proto "https"
        ProxyPass / http://127.0.0.1:18791/ connectiontimeout=5 timeout=35 retry=0
        ProxyPassReverse / http://127.0.0.1:18791/

        ErrorLog ${APACHE_LOG_DIR}/loop-error.log
        CustomLog ${APACHE_LOG_DIR}/loop-access.log combined
    </VirtualHost>

    <VirtualHost *:443>
        ServerName 144-31-30-62.sslip.io

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/144-31-30-62.sslip.io/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/144-31-30-62.sslip.io/privkey.pem
        SSLProtocol -all +TLSv1.2 +TLSv1.3

        RewriteEngine On
        RewriteRule ^ https://app.tonsuite.org%{REQUEST_URI} [R=301,L,NE]

        ErrorLog ${APACHE_LOG_DIR}/loop-legacy-error.log
        CustomLog ${APACHE_LOG_DIR}/loop-legacy-access.log combined
    </VirtualHost>
</IfModule>

<VirtualHost *:80>
    ServerName 144-31-30-62.sslip.io

    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://app.tonsuite.org%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>
